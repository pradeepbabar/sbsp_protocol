name: sbsp-lab

mgmt:
  network: sbsp-mgmt
  ipv4-subnet: 172.30.0.0/24

topology:

  kinds:
    linux:
      image: sbsp:latest
      image-pull-policy: never
      env:
        SBSP_LOG_LEVEL: DEBUG
        SBSP_AREA: "0.0.0.0"
      exec:
        - /app/docker-entrypoint.sh

  nodes:
    # Spine routers
    R1:
      kind: linux
      mgmt-ipv4: 172.30.0.11
      env:
        SBSP_ROUTER_ID: "10.0.0.1"
        SBSP_LOOPBACK:  "192.168.1.0/24"

    R2:
      kind: linux
      mgmt-ipv4: 172.30.0.12
      env:
        SBSP_ROUTER_ID: "10.0.0.2"
        SBSP_LOOPBACK:  "192.168.2.0/24"

    # Leaf routers
    R3:
      kind: linux
      mgmt-ipv4: 172.30.0.13
      env:
        SBSP_ROUTER_ID: "10.0.0.3"
        SBSP_LOOPBACK:  "192.168.3.0/24"

    R4:
      kind: linux
      mgmt-ipv4: 172.30.0.14
      env:
        SBSP_ROUTER_ID: "10.0.0.4"
        SBSP_LOOPBACK:  "192.168.4.0/24"

    R5:
      kind: linux
      mgmt-ipv4: 172.30.0.15
      env:
        SBSP_ROUTER_ID: "10.0.0.5"
        SBSP_LOOPBACK:  "192.168.5.0/24"

    R6:
      kind: linux
      mgmt-ipv4: 172.30.0.16
      env:
        SBSP_ROUTER_ID: "10.0.0.6"
        SBSP_LOOPBACK:  "192.168.6.0/24"

  links:
    # Spine-leaf links (same as before, no interface name conflicts)
    - endpoints: ["R1:eth1", "R2:eth1"]
    - endpoints: ["R1:eth2", "R3:eth1"]
    - endpoints: ["R1:eth3", "R4:eth1"]
    - endpoints: ["R2:eth2", "R5:eth1"]
    - endpoints: ["R2:eth3", "R6:eth1"]
    - endpoints: ["R3:eth2", "R5:eth2"]
    - endpoints: ["R4:eth2", "R6:eth2"]